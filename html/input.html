<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>명림당 — 이야기 들려다오</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      font-family: "Noto Serif KR", "Apple SD Gothic Neo", serif;
      background: #0d0c12;
      color: #f3e9d2;
      min-height: 100%;
    }
    body {
      background:
        radial-gradient(circle at top, rgba(166,124,82,.12), transparent 28%),
        radial-gradient(circle at bottom, rgba(217,178,111,.08), transparent 30%),
        linear-gradient(180deg, #16131c 0%, #0c0a10 100%);
    }
    body::before {
      content: "";
      position: fixed; inset: 0;
      pointer-events: none; z-index: -2;
      background-image:
        radial-gradient(circle at 16% 12%, rgba(235,205,157,.16), transparent 14%),
        radial-gradient(circle at 82% 18%, rgba(216,178,112,.12), transparent 18%),
        radial-gradient(circle at 50% 72%, rgba(243,233,210,.06), transparent 22%);
    }
    .top-bar {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 18px 28px; z-index: 10;
    }
    .brand-link {
      text-decoration: none; color: #d8bf8b;
      font-size: 15px; letter-spacing: .18em;
    }
    .progress-track {
      position: fixed; top: 0; left: 0; right: 0;
      height: 2px; background: rgba(230,198,138,.12); z-index: 20;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #c9a55a, #e8c78f);
      transition: width .5s ease;
    }
    .page {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 80px 20px 40px;
    }
    .card {
      width: 100%; max-width: 520px;
      background: rgba(13,12,18,.7);
      border: 1px solid rgba(230,198,138,.16);
      border-radius: 24px;
      padding: 44px 36px 40px;
      backdrop-filter: blur(8px);
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
      position: relative; overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute; top: -80px; left: 50%; transform: translateX(-50%);
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(232,184,108,.18), transparent 70%);
      filter: blur(12px);
    }
    .step-panel { display: none; }
    .step-panel.active { display: block; animation: fadeIn .35s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }
    .step-label {
      font-size: 12px; letter-spacing: .2em; color: #b79a6b;
      margin-bottom: 10px; text-transform: uppercase;
    }
    .step-title {
      font-size: 22px; font-weight: 600;
      line-height: 1.45; margin: 0 0 28px; letter-spacing: -.01em;
    }
    .field { margin-bottom: 20px; }
    .field-label {
      display: block; font-size: 12px;
      color: rgba(243,233,210,.55); letter-spacing: .12em; margin-bottom: 8px;
    }
    .text-input, .sel-input, .num-input {
      width: 100%; padding: 14px 16px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(230,198,138,.18);
      border-radius: 12px;
      color: #f3e9d2; font-family: inherit; font-size: 16px;
      outline: none; transition: border-color .2s;
      -webkit-appearance: none; appearance: none;
    }
    .text-input::placeholder { color: rgba(243,233,210,.3); }
    .text-input:focus, .sel-input:focus, .num-input:focus {
      border-color: rgba(232,184,108,.5);
    }
    .sel-input { cursor: pointer; }
    .sel-input option { background: #1a1722; color: #f3e9d2; }
    .date-row { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; }
    .gender-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 28px; }
    .gender-card {
      padding: 20px 16px;
      border: 1px solid rgba(230,198,138,.16);
      border-radius: 14px; background: rgba(255,255,255,.03);
      text-align: center; cursor: pointer; transition: all .2s;
    }
    .gender-card:hover { border-color: rgba(232,184,108,.3); }
    .gender-card.selected { border-color: rgba(232,184,108,.6); background: rgba(232,184,108,.08); }
    .gender-icon { display: block; font-size: 22px; margin-bottom: 8px; }
    .gender-name { font-size: 15px; color: #f3e9d2; }
    .hour-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 28px; }
    .hour-card {
      padding: 12px 8px;
      border: 1px solid rgba(230,198,138,.14); border-radius: 12px;
      background: rgba(255,255,255,.03);
      text-align: center; cursor: pointer; transition: all .2s;
    }
    .hour-card:hover { border-color: rgba(232,184,108,.3); }
    .hour-card.selected { border-color: rgba(232,184,108,.6); background: rgba(232,184,108,.08); }
    .hour-name { font-size: 14px; font-weight: 600; color: #f3e9d2; display: block; }
    .hour-sub  { font-size: 10px; color: rgba(243,233,210,.45); display: block; margin-top: 3px; line-height: 1.3; }
    .hour-card.unknown { grid-column: span 3; }
    .btn-row { display: flex; gap: 10px; margin-top: 4px; }
    .btn-next, .btn-submit {
      flex: 1; padding: 15px;
      background: linear-gradient(180deg, #e8c78f 0%, #cda161 100%);
      color: #1a110a; border: none; border-radius: 12px;
      font-family: inherit; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: all .2s;
    }
    .btn-next:hover, .btn-submit:hover {
      transform: translateY(-1px); box-shadow: 0 8px 24px rgba(205,161,97,.3);
    }
    .btn-back {
      flex: 0 0 auto; padding: 15px 20px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(230,198,138,.16);
      color: rgba(243,233,210,.7); border-radius: 12px;
      font-family: inherit; font-size: 15px; cursor: pointer; transition: all .2s;
    }
    .btn-back:hover { background: rgba(255,255,255,.08); }
    .loading-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(10,9,14,.92); z-index: 100;
      flex-direction: column; align-items: center; justify-content: center; gap: 24px;
    }
    .loading-overlay.show { display: flex; }
    .spinner {
      width: 44px; height: 44px;
      border: 2px solid rgba(232,184,108,.2);
      border-top-color: #e8c78f; border-radius: 50%;
      animation: spin 1.1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 15px; color: rgba(243,233,210,.6); letter-spacing: .05em; }
    .err-msg {
      display: none; margin-top: 10px; font-size: 13px; color: #e07070;
      padding: 10px 14px; background: rgba(224,112,112,.08); border-radius: 8px;
    }
    @media (max-width: 480px) {
      .card { padding: 36px 22px 32px; }
      .step-title { font-size: 20px; }
      .date-row { grid-template-columns: 1fr 1fr; }
      .date-row .field:first-child { grid-column: span 2; }
    }
  </style>
</head>
<body>
  <div class="progress-track">
    <div class="progress-fill" id="pbar" style="width:33%"></div>
  </div>
  <div class="top-bar">
    <a href="/" class="brand-link">명림당</a>
  </div>

  <main class="page">
    <div class="card">

      <!-- 스텝 1: 이름 + 성별 -->
      <div class="step-panel active" id="step1">
        <div class="step-label">첫 번째</div>
        <h2 class="step-title">이름과 성별을<br/>알려다오</h2>
        <div class="field">
          <label class="field-label" for="name">이름</label>
          <input type="text" id="name" class="text-input" placeholder="이름을 적어다오" maxlength="20" autocomplete="off" />
        </div>
        <div class="gender-grid">
          <div class="gender-card" data-val="female" onclick="pickGender(this)">
            <span class="gender-icon">☽</span>
            <span class="gender-name">여성</span>
          </div>
          <div class="gender-card" data-val="male" onclick="pickGender(this)">
            <span class="gender-icon">☀</span>
            <span class="gender-name">남성</span>
          </div>
        </div>
        <div class="err-msg" id="err1"></div>
        <button class="btn-next" onclick="toStep(2)">다음으로</button>
      </div>

      <!-- 스텝 2: 생년월일 -->
      <div class="step-panel" id="step2">
        <div class="step-label">두 번째</div>
        <h2 class="step-title">태어난 날을<br/>알려다오</h2>
        <div class="date-row">
          <div class="field">
            <label class="field-label" for="byear">년도</label>
            <input type="number" id="byear" class="num-input" placeholder="예) 1993" min="1900" max="2024" inputmode="numeric" />
          </div>
          <div class="field">
            <label class="field-label" for="bmonth">월</label>
            <select id="bmonth" class="sel-input" onchange="updateDays()">
              <option value="">월</option>
              <option>1</option><option>2</option><option>3</option>
              <option>4</option><option>5</option><option>6</option>
              <option>7</option><option>8</option><option>9</option>
              <option>10</option><option>11</option><option>12</option>
            </select>
          </div>
          <div class="field">
            <label class="field-label" for="bday">일</label>
            <select id="bday" class="sel-input">
              <option value="">일</option>
            </select>
          </div>
        </div>
        <div class="err-msg" id="err2"></div>
        <div class="btn-row">
          <button class="btn-back" onclick="toStep(1)">이전으로</button>
          <button class="btn-next" onclick="toStep(3)">다음으로</button>
        </div>
      </div>

      <!-- 스텝 3: 태어난 시 -->
      <div class="step-panel" id="step3">
        <div class="step-label">세 번째</div>
        <h2 class="step-title">태어난 시를<br/>알려다오</h2>
        <p style="font-size:14px;color:rgba(243,233,210,.5);margin:-12px 0 20px;line-height:1.7;">
          모른다면 아래 '모름'을 선택해도 된다
        </p>
        <div class="hour-grid" id="hourGrid"></div>
        <div class="err-msg" id="err3"></div>
        <div class="btn-row">
          <button class="btn-back" onclick="toStep(2)">이전으로</button>
          <button class="btn-submit" onclick="submitForm()">사주를 봐다오</button>
        </div>
      </div>

    </div>
  </main>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">잠시만 기다려다오...</div>
  </div>

  <script>
    let selectedGender = '';
    let selectedHour   = null;
    let hourUnknown    = false;

    const HOURS = [
      { label: '자시', sub: '밤 11시~새벽 1시', val: 0  },
      { label: '축시', sub: '새벽 1시~3시',     val: 2  },
      { label: '인시', sub: '새벽 3시~5시',     val: 4  },
      { label: '묘시', sub: '새벽 5시~7시',     val: 6  },
      { label: '진시', sub: '아침 7시~9시',     val: 8  },
      { label: '사시', sub: '아침 9시~11시',    val: 10 },
      { label: '오시', sub: '낮 11시~오후 1시', val: 12 },
      { label: '미시', sub: '오후 1시~3시',     val: 14 },
      { label: '신시', sub: '오후 3시~5시',     val: 16 },
      { label: '유시', sub: '저녁 5시~7시',     val: 18 },
      { label: '술시', sub: '저녁 7시~9시',     val: 20 },
      { label: '해시', sub: '밤 9시~11시',      val: 22 },
    ];

    (function buildGrid() {
      const grid = document.getElementById('hourGrid');
      HOURS.forEach(h => {
        const el = document.createElement('div');
        el.className = 'hour-card';
        el.dataset.val = h.val;
        el.innerHTML = `<span class="hour-name">${h.label}</span><span class="hour-sub">${h.sub}</span>`;
        el.onclick = () => pickHour(el, h.val, false);
        grid.appendChild(el);
      });
      const unk = document.createElement('div');
      unk.className = 'hour-card unknown';
      unk.innerHTML = `<span class="hour-name">모름</span><span class="hour-sub">태어난 시각을 모릅니다</span>`;
      unk.onclick = () => pickHour(unk, null, true);
      grid.appendChild(unk);
    })();

    function pickGender(el) {
      document.querySelectorAll('.gender-card').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
      selectedGender = el.dataset.val;
    }

    function pickHour(el, val, unknown) {
      document.querySelectorAll('.hour-card').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
      selectedHour = val;
      hourUnknown  = unknown;
    }

    function updateDays() {
      const year  = parseInt(document.getElementById('byear').value) || 2000;
      const month = parseInt(document.getElementById('bmonth').value);
      const sel   = document.getElementById('bday');
      const prev  = sel.value;
      sel.innerHTML = '<option value="">일</option>';
      if (!month) return;
      const max = new Date(year, month, 0).getDate();
      for (let d = 1; d <= max; d++) {
        const o = document.createElement('option');
        o.value = d; o.textContent = d;
        sel.appendChild(o);
      }
      if (prev && parseInt(prev) <= max) sel.value = prev;
    }
    document.getElementById('byear').addEventListener('input', updateDays);

    function toStep(n) {
      if (!validateStep(n - 1)) return;
      document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('step' + n).classList.add('active');
      document.getElementById('pbar').style.width = (n / 3 * 100) + '%';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function validateStep(step) {
      clearErrors();
      if (step === 1) {
        if (!document.getElementById('name').value.trim())
          return showErr('err1', '이름을 적어다오');
        if (!selectedGender)
          return showErr('err1', '성별을 선택해다오');
      }
      if (step === 2) {
        const y = parseInt(document.getElementById('byear').value);
        const m = document.getElementById('bmonth').value;
        const d = document.getElementById('bday').value;
        if (!y || y < 1900 || y > new Date().getFullYear())
          return showErr('err2', '올바른 년도를 입력해다오');
        if (!m) return showErr('err2', '월을 선택해다오');
        if (!d) return showErr('err2', '일을 선택해다오');
      }
      return true;
    }

    function showErr(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg; el.style.display = 'block';
      return false;
    }
    function clearErrors() {
      document.querySelectorAll('.err-msg').forEach(e => e.style.display = 'none');
    }

    function submitForm() {
      clearErrors();
      if (selectedHour === null && !hourUnknown)
        return showErr('err3', '태어난 시를 선택해다오');

      const data = {
        name:        document.getElementById('name').value.trim(),
        gender:      selectedGender,
        year:        parseInt(document.getElementById('byear').value),
        month:       parseInt(document.getElementById('bmonth').value),
        day:         parseInt(document.getElementById('bday').value),
        hour:        hourUnknown ? 12 : selectedHour,
        hourUnknown: hourUnknown,
      };
      sessionStorage.setItem('sajuForm', JSON.stringify(data));
      document.getElementById('loadingOverlay').classList.add('show');
      window.location.href = '/result';
    }

    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const active = document.querySelector('.step-panel.active');
      if (active?.id === 'step1') toStep(2);
      else if (active?.id === 'step2') toStep(3);
      else if (active?.id === 'step3') submitForm();
    });
  </script>
</body>
</html>
